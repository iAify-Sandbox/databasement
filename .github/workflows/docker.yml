name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-base-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      base_image_tag: ${{ steps.base_image_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Check for base image changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            base:
              - 'docker/php/**'

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            davidcrty/databasement-php
            ghcr.io/${{ github.repository_owner }}/databasement-php
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}

      - name: Set up QEMU
        if: steps.filter.outputs.base == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.filter.outputs.base == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: steps.filter.outputs.base == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: steps.filter.outputs.base == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        if: steps.filter.outputs.base == 'true'
        uses: docker/build-push-action@v7
        with:
          context: docker/php
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine base image tag for app build
        id: base_image_tag
        run: |
          if [[ "${{ steps.filter.outputs.base }}" == "true" ]]; then
            echo "tag=${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "### Base Image" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.filter.outputs.base }}" == "true" ]]; then
            echo "Rebuilt and pushed:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes detected — skipped rebuild." >> $GITHUB_STEP_SUMMARY
            echo "Using \`davidcrty/databasement-php:latest\`" >> $GITHUB_STEP_SUMMARY
          fi

  build-app-image:
    runs-on: ubuntu-latest
    needs: build-base-image
    if: always() && !failure() && !cancelled()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            davidcrty/databasement
            ghcr.io/${{ github.repository_owner }}/databasement
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_COMMIT_HASH=${{ github.sha }}
            APP_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && steps.meta.outputs.version || '' }}
            BASE_IMAGE=davidcrty/databasement-php:${{ needs.build-base-image.outputs.base_image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### App Image" >> $GITHUB_STEP_SUMMARY
          echo "Pushed:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Base image: \`davidcrty/databasement-php:${{ needs.build-base-image.outputs.base_image_tag }}\`" >> $GITHUB_STEP_SUMMARY

  snyk-monitor:
    runs-on: ubuntu-latest
    needs: build-app-image
    # Only when the `latest` tag was (re)published, i.e. a push to the default branch.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Monitor latest image in Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk container monitor davidcrty/databasement:latest \
            --file=Dockerfile \
            --platform=linux/amd64 \
            --project-name=databasement \
            --project-tags=image=latest
