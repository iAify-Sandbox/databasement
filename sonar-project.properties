sonar.projectKey=David-Crty_databasement
sonar.organization=david-crty
sonar.projectName=databasement

# Coverage is only collected for app/ (see phpunit.xml <source>), so scope
# analysis sources there too — otherwise config/, database/, routes/, etc.
# count as uncovered main code and dilute the coverage percentage.
sonar.sources=app
sonar.tests=tests

sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=junit.xml

# S116 (field naming) defaults to camelCase, but Livewire form/component
# properties and Eloquent-facing attributes are intentionally snake_case so
# they map 1:1 to DB columns, validation keys and wire:model bindings. The free
# plan can't relax the rule's regex (custom Quality Profiles are paid), so
# suppress S116 in those layers instead.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S116
sonar.issue.ignore.multicriteria.e1.resourceKey=app/Livewire/**/*.php
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S116
sonar.issue.ignore.multicriteria.e2.resourceKey=app/Models/**/*.php
